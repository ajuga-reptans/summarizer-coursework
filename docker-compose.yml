version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: streamlit run frontend/ui.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    environment:
      - PYTHONUNBUFFERED=1